apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumeriq-worker
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumeriq-worker
  template:
    metadata:
      labels:
        app: consumeriq-worker
    spec:
      containers:
        - name: worker
          image: consumeriq-backend:local
          command: ["celery", "-A", "backend.redis.worker.celery_app", "worker", "-l", "info"]
          env:
            - name: REDIS_URL
              value: redis://redis.consumeriq.svc.cluster.local:6379/0
