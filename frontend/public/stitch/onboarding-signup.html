<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sign Up | ConsumerIQ</title>
<!-- Google Fonts: Inter & JetBrains Mono -->

                      "on-surface": "#1a1c1c",
                      "on-secondary": "#ffffff",

                      "margin-mobile": "16px",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="font-body-base text-on-background selection:bg-primary-fixed">
<main class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-[440px] flex flex-col space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Card Container -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm overflow-hidden">
<!-- Progress Bar Integrated -->
<div class="w-full h-1 bg-surface-container">
<div class="bg-primary h-full transition-all duration-500 ease-in-out" id="progress-indicator" style="width: 33.33%;"></div>
</div>
<div class="p-8">
<!-- Header -->
<div class="text-center mb-8">
<h1 class="font-headline-md text-headline-md text-primary mb-2" id="step-title">Welcome to ConsumerIQ</h1>
<p class="font-body-sm text-body-sm text-secondary" id="step-subtitle">The intelligence layer for your next big launch.</p>
</div>
<!-- Form -->
<form class="space-y-4" onsubmit="event.preventDefault();">
<!-- Step 1: Basic Info -->
<div class="step-content space-y-4" id="step-1">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="name">Full Name</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="name" placeholder="Acme Corp" type="text">
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="email">Work Email</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email">
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="password">Password</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password">
</div>
<button class="w-full h-11 bg-primary text-on-primary font-body-sm font-medium rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all mt-6" onclick="goToStep(2)" type="button">
            Continue
        </button>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-on-secondary-container font-mono-label text-[10px] tracking-widest">OR CONTINUE WITH</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full h-11 bg-surface-container-lowest border border-outline-variant text-primary font-body-sm font-medium rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Google
        </button>
</div>
<!-- Step 2: Market Preferences -->
<div class="step-content space-y-4 hidden" id="step-2">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="workspace">Workspace Name</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="workspace" placeholder="My Organization" type="text">
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="industry">Industry</label>
<select class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="industry">
<option value="">Select...</option>
<option value="ecommerce">E-Commerce</option>
<option value="saas">SaaS</option>
<option value="retail">Retail</option>
</select>
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="region">Region</label>
<select class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="region">
<option value="">Select...</option>
<option value="na">North America</option>
<option value="eu">Europe</option>
<option value="apac">APAC</option>
</select>
</div>
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="datasource">Primary Data Source</label>
<select class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="datasource">
<option value="">Select primary source...</option>
<option value="shopee">Shopee</option>
<option value="tokopedia">Tokopedia</option>
<option value="tiktok">TikTok Shop</option>
<option value="amazon">Amazon</option>
</select>
</div>
<div class="flex gap-3 mt-6">
<button class="w-1/3 h-11 bg-surface-container-low border border-outline-variant text-primary font-body-sm font-medium rounded-lg hover:bg-surface-container transition-all" onclick="goToStep(1)" type="button">
                Back
            </button>
<button class="w-2/3 h-11 bg-primary text-on-primary font-body-sm font-medium rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all" onclick="goToStep(3)" type="button">
                Continue
            </button>
</div>
</div>
<!-- Step 3: Intelligence Survey -->
<div class="step-content space-y-4 hidden" id="step-3">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="competitors">Top Competitors</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="competitors" placeholder="e.g. Brand A, Brand B" type="text">
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="keywords">Target Keywords/Niche</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="keywords" placeholder="e.g. Organic Skincare, Eco-friendly" type="text">
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="icp">Ideal Customer Profile</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="icp" placeholder="e.g. Millennials seeking sustainability" type="text">
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="painpoints">Core Pain Points</label>
<input class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant" id="painpoints" placeholder="e.g. Price, Quality" type="text">
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps uppercase text-secondary" for="pricerange">Price Range</label>
<select class="w-full h-11 px-3 bg-transparent border border-outline-variant rounded-lg text-body-sm font-body-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all" id="pricerange">
<option value="">Select...</option>
<option value="budget">Budget</option>
<option value="mid">Mid-Market</option>
<option value="premium">Premium</option>
</select>
</div>
</div>
<div class="flex gap-3 mt-6">
<button class="w-1/3 h-11 bg-surface-container-low border border-outline-variant text-primary font-body-sm font-medium rounded-lg hover:bg-surface-container transition-all" onclick="goToStep(2)" type="button">
                Back
            </button>
<button class="w-2/3 h-11 bg-primary text-on-primary font-body-sm font-medium rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all" type="submit">
                Complete Setup
            </button>
</div>
</div>
</form>
</div>
</div>
<!-- Footer Links -->
<div class="text-center space-y-4">
<p class="font-body-sm text-body-sm text-secondary">
                    Already have an account? 
                    <a class="text-primary hover:underline font-medium" href="#">Log in</a>
</p>
<p class="text-[11px] text-on-secondary-container leading-relaxed max-w-[320px] mx-auto">
                    By clicking continue, you agree to our 
                    <a class="underline hover:text-primary" href="#">Terms of Service</a> and 
                    <a class="underline hover:text-primary" href="#">Privacy Policy</a>.
                </p>
</div>
</div>
</main>
<!-- Micro-interaction for inputs -->
<script>
        document.querySelectorAll('input, select').forEach(input => {
            input.addEventListener('focus', () => {
                // Potential for adding subtle ripple or ring effects if desired
            });
        });

        const titles = {
            1: { title: "Welcome to ConsumerIQ", sub: "The intelligence layer for your next big launch." },
            2: { title: "Market Preferences", sub: "Configure your workspace data sources." },
            3: { title: "Intelligence Survey", sub: "Help us calibrate your dashboard." }
        };

        const goToStep = (step) => {
            // Hide all steps
            document.querySelectorAll('.step-content').forEach(el => {
                el.classList.add('hidden');
            });
            
            // Show target step
            document.getElementById(`step-${step}`).classList.remove('hidden');
            
            // Update progress bar
            const totalSteps = 3;
            const percentage = (step / totalSteps) * 100;
            document.getElementById('progress-indicator').style.width = `${percentage}%`;

            // Update Header
            document.getElementById('step-title').innerText = titles[step].title;
            document.getElementById('step-subtitle').innerText = titles[step].sub;
        }
    </script>
</body></html>
