apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: consumeriq-local
servers: 1
agents: 2
kubeAPI:
  host: "127.0.0.1"
  hostIP: "127.0.0.1"
ports:
  # Expose common ports; adjust as needed when services are added.
  - port: 5432:5432
    nodeFilters:
      - server:0
  - port: 6379:6379
    nodeFilters:
      - server:0
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
