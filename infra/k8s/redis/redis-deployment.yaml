apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: consumeriq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2.14-alpine3.21
          ports:
            - containerPort: 6379
          args: ["--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
